name: ragflow-cli
version: 1.0.1
summary: RAGFlow CLI
description: RAGFlow client desktop application for document management and knowledge base.

confinement: strict
base: core22
grade: stable

apps:
  ragflow-cli:
    command: ragflow_cli
    extensions: [gnome]
    plugs:
      - network
      - network-bind
parts:
  ragflow-cli:
    # Flutter 项目根目录（snapcraft 从仓库根目录执行时，.. 指向仓库根）
    source: ..
    plugin: flutter
    flutter-target: lib/main.dart
