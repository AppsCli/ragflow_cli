name: Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  project-id: ragflow-cli

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-all.apk
          path: ./build/app/outputs/flutter-apk/app-debug.apk
      - run: flutter build appbundle --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-all.aab
          path: ./build/app/outputs/bundle/debug/app-debug.aab

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - run: flutter config --no-enable-android
      - run: flutter pub get
      - run: flutter build ipa  --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: Runner.xcarchive
          path: ./build/ios/archive/Runner.xcarchive

  linux:
    name: Linux
    runs-on: ubuntu-22.04
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - name: Install required build tools for linux
        run: sudo apt-get update && sudo apt-get install clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev locate rpm patchelf libfuse2
      - name: Build linux release
        run: |
          flutter config --enable-linux-desktop
          flutter config --no-enable-android
          flutter pub get
          flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release.zip
          path: ./build/linux/x64/release/bundle
      - name: Install flutter_distributor
        run: |
          dart pub global activate flutter_distributor
      - name: Build deb package
        run: |
          flutter_distributor package --platform linux --targets deb
      - uses: actions/upload-artifact@v4
        with:
          name: ragflow_cli.deb
          path: dist/**/**/*.deb
      - name: Build rpm package
        run: |
          flutter_distributor package --platform linux --targets rpm
      - uses: actions/upload-artifact@v4
        with:
          name: ragflow_cli.rpm
          path: dist/**/**/*.rpm
      - name: Build AppImage package
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/13/obsolete-appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/
          flutter_distributor package --platform linux --targets appimage
      - uses: actions/upload-artifact@v4
        with:
          name: ragflow_cli.AppImage
          path: dist/**/**/*.AppImage
      - run: rm -rf ./build
      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic
      - run: hash -r
      - run: flutter clean
      - name: Setup LXD
        uses: canonical/setup-lxd@main
        with:
          channel: latest/stable

  macos:
    name: MacOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - run: flutter config --enable-macos-desktop
      - run: flutter config --no-enable-android
      - run: flutter pub get
      - run: flutter build macos --debug
      - run: mkdir -p build/dmg
      - run: cp -R build/macos/Build/Products/Debug/RAGFlowCli.app build/dmg/RAGFlowCli.app
      - run: ln -s /Applications  build/dmg
      - run: ls build/dmg
      - run: hdiutil create -srcfolder build/dmg -volname "RAGFlow CLI" -format UDZO -ov -imagekey zlib-level=9 ragflow_cli.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: ragflow_cli.dmg
          path: ./ragflow_cli.dmg

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - run: flutter config --enable-windows-desktop
      - run: flutter config --no-enable-android
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release.zip
          path: ./build/windows/x64/runner/Release
      - run: flutter clean
      - run: flutter pub get
      - run: dart run msix:create
      - uses: actions/upload-artifact@v4
        with:
          name: ragflow_cli.msix
          path: ./build/windows/x64/runner/Release/ragflow_cli.msix
      - name: Building the installer
        run: |
          "%programfiles(x86)%\Inno Setup 6\iscc.exe" "windows-setup.iss"
        shell: cmd
      - name: Upload the installer as an artifact
        uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          name: RAGFlow-CLI-Setup.exe
          path: Output/RAGFlow-CLI-Setup.exe

  build-flutter-app:
    name: Build and compressed Flutter app
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Flutter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - name: Build Flutter linux version
        working-directory: ${{ github.workspace }}
        run: |
          ./build-flutter-app.sh
      - name: Upload app archive to workflow
        uses: actions/upload-artifact@v4
        with:
          name: RAGFlow-CLI-Archive
          path: ragflow_cli-Linux-Portable.tar.gz

  build-flatpak:
    name: Build flatpak
    needs: build-flutter-app
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: RAGFlow-CLI-Archive
      - name: Prepare archive for flatpak
        run: |
          cp RAGFlow-CLI-Archive/ragflow_cli-Linux-Portable.tar.gz . 2>/dev/null || cp ragflow_cli-Linux-Portable.tar.gz . 2>/dev/null || true
      - name: Build .flatpak
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: RAGFlow-CLI.flatpak
          manifest-path: flathub_repo/com.iotserv.RAGFlowCli.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false
      - name: Upload .flatpak artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: Flatpak artifact
          path: RAGFlow-CLI.flatpak
